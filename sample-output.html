<!DOCTYPE html>
<html lang="en">
   <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Mini Project | Sample Output</title>
    <link rel="stylesheet" href="style.css">
   </head>
   <body>
    <!-- Start Logo and Menu -->
      <header>
        <nav class="navbar">
            <div class="logo">
              <img src="https://www.asics.co.in/logo-rxE.svg">
            </div>
            <ul class="nav-links">
               <li><a href="#">Home</a></li>
               <li><a href="#">About</a></li>
               <li><a href="#">Brands</a></li>
               <li><a href="#">More</a></li>
               <li><a href="#">Contact</a></li>
            </ul>
            <div class="nav-icons">
               <button>🔍Search</button>
               <button class="cart-btn">🛒0</button>
               <img src="https://img.magnific.com/premium-vector/business-woman-character-vector-illustration_1133257-2432.jpg?semt=ais_hybrid&w=740&q=80" class="user">
            </div>

 
         <button class="hamburger-btn">
            ☰
         </button>
         <!-- start Mobile Menu -->
          <div class="mobile-menu">
          <ul>
              <li><a href="#">Home</a></li>
               <li><a href="#">About</a></li>
               <li><a href="#">Brands</a></li>
               <li><a href="#">More</a></li>
               <li><a href="#">Contact</a></li>
          </ul>
        </div>
     </nav>
     </header>
 <section class="checkout-container">
<div class="left-container">
<h3 class="sub-heading">Checkout</h3>
<div class="input-group">
    <label>Email ID</label>
    <input type="email" placeholder="Enter your email">
</div>
<div class="payment-card">
    <h2>Payment Information</h2>
    <div class="payment-options">
        <button class="active">💳 Card</button>
        <button>₿Crypto</button>
        <button>🏦Bank </button>
        <button>UPI</button>
    </div>
    <div class="input-group">
        <label>Card Number</label>
        <input type="text" placeholder="Enter card number">
    </div>

    <div class="row">
        <div class="input-group">
            <label>Expiry Date</label>
            <input type="text" placeholder="MM/YY">
        </div>
        <div class="input-group">
            <label>CVV</label>
            <input type="password" placeholder="...">
        </div>
    </div>
    <div class="row">
        <div class="input-group">
            <label>Country</label>
            <input type="text" placeholder="India">
         </div>
         <div class="input-group">
            <label>ZIP Code</label>
            <input type="text" placeholder="xxxxx">
         </div>
        </div>
        </div>
        </div>
        <div class="right-container">
          <div class="summary-card">
            <h2>Order Summary</h2>
            <h5>Enter Coupon Code</h5>
            <div class="row">
                <div class="input-group">
            <input type="text" placeholder="Coupon Code">
           </div>
           <div class="input-group">
         <button class="coupon-btn">Apply</button>
           </div>
           </div>
            <div class="summary-row">
                <span>Subtotal:</span>
                <span>Rs.4700</span>
            </div>
                <div class="summary-row">
                    <span>Taxes:</span>
                    <span>Rs199</span>
        </div>
         <div class="summary-row">
                    <span>Discount:</span>
                    <span>Rs.0</span>
        </div>
        <hr>
       <div class="summary-row total">
            <span>Total:</span>
            <span>Rs.4999</span>
        </div>

        <button class="pay-btn">Pay Now</button>
        <div class="payment-icons">
             <img src="https://uxwing.com/wp-content/themes/uxwing/download/brands-and-social-media/razorpay-icon.png" style="width:80px;">
    <img src="https://static.vecteezy.com/system/resources/previews/029/899/733/non_2x/secure-payment-credit-card-icon-with-shield-secure-transaction-stock-illustration-vector.jpg" style="width:100px;">
        </div>
    </div>
</div>
     </section>
     </body>
     </html>
